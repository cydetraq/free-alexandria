name: Regenerate reviewed catalog

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Regenerate catalog exports
        run: python3 tools/export_catalog_reviewed.py
      - name: Commit regenerated outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/catalog.md docs/curated-reading.md catalog/catalog.json lists/curated-reading.json
          if ! git diff --cached --quiet; then
            git commit -m 'Regenerate merged practical catalog'
            git push
          fi
