name: Acquire all remaining facsimile PDFs

on:
  push:
    branches: [main]
    paths:
      - tools/replace_text_pdfs.py
      - .github/workflows/acquire-all-facsimiles.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: acquire-all-facsimiles
  cancel-in-progress: false

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Discover and download every remaining facsimile
        run: python3 tools/replace_text_pdfs.py --allow-unresolved
      - name: Validate catalog
        run: python3 tools/validate_catalog.py --strict
      - name: Commit replacements and acquisition report
        run: |
          git config user.name "free-alexandria-bot"
          git config user.email "free-alexandria-bot@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No facsimile changes were produced."
          else
            git commit -m "Replace remaining generated PDFs with facsimile scans"
            git push origin HEAD:main
          fi
