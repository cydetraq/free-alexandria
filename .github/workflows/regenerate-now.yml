name: Regenerate stale catalog exports

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/regenerate-now.yml'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Regenerate and verify catalog
        run: |
          python3 tools/export_catalog.py
          ! grep -q '^## Preparedness & Field Manuals$' docs/catalog.md
          ! grep -q '^## Practical Library$' docs/catalog.md
          grep -q '^## Practical Skills & Preparedness$' docs/catalog.md
          python3 tools/export_catalog.py --check
      - name: Commit regenerated outputs
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add catalog/catalog.json docs/catalog.md lists/curated-reading.json docs/curated-reading.md
          if ! git diff --cached --quiet; then
            git commit -m 'Regenerate catalog with merged practical collection'
            git push
          fi
