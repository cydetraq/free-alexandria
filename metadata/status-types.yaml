rights_status:
  pre-1931-work-candidate: The underlying work appears to have been first published by 1930 or earlier. This is a research lead, not permission to distribute any particular edition.
  edition-review-required: The work may be eligible, but the exact source edition, translation, additions, and rights basis require review before acquisition.
  open-license: Local files may be mirrored only with the license and attribution record.
  permission-granted: Local files may be mirrored only with retained written permission.
  copyrighted-link-only: Catalog entry may link to legitimate sources but has no local work file.
  verify-edition: Candidate requires source, edition, and distribution review.

translation_quality:
  recommended-pd-translation: Strong public-domain translation suitable as default.
  serviceable-pd-translation: Readable and complete but dated or superseded.
  historical-translation: Preserve with clear warning about archaic, abridged, or censored text.
  original-language-only: No acceptable distributable English translation selected.
